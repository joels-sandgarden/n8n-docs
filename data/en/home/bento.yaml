header:
  title: Mental models, not API dumps.
  description: Each page transfers the mental model of one n8n subsystem — what it is for, the design decisions behind it, and how it relates to its neighbors.

items:
  - col: col-5
    icon: bento/rocket_launch
    title: Get up to speed without reading a thousand files
    description: The guide covers the runtime's spine — how a workflow becomes an execution, how the engine walks the graph, and what the canvas does and doesn't tell you about it. Hold the whole architecture in your head before opening a file.
    badges: [ ]

  - col: col-7
    icon: bento/extension
    title: Grounded in the source
    description: Every claim cites real files and symbols from the n8n repository, and every page ends with a "Where to look in the code" map. Nothing here is folklore — it was read out of the code.
    badges: [ Execution Engine, Partial Executions, Expressions, Queue Mode ]

  - col: col-7
    icon: bento/shield
    title: Complements the official docs
    description: docs.n8n.io owns tutorials, node reference, and hosting guides. This guide covers what those docs have not explained — the scheduling algorithm, the partial-execution machinery, item lineage, the expression runtime, and more.
    badges: [ ]
